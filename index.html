<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoService - DeteilPro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/icon.svg">
</head>
<body>
    <!-- меню -->
    <header class="menu">
        <img class="logo_menu" src="assets/logo.svg" alt="logo">
        <ol class="li_menu">
            <a style="text-decoration: none; color: #000000a6;" href="">
                <li style="margin-left: -10px;">
                    <img style="width: 12px; position: relative; top: 3px; left: -5px;" src="assets/download.svg" alt="">
                    Скачать
                </li>  
            </a>
            <li>
                <img style="width: 13px; position: relative; top: 2px; left: -5px;" src="assets/user.svg" alt="">
                Вход
                <div class="li_menu_batton"></div> 
            </li>
        </ol>
    </header>

    <!-- вход -->
     <center>
        <div class="close_form">
            <img style="margin-top: 13px; opacity: 50%;" src="assets/close.svg" alt="">
        </div>
        <!-- QR -->
        <img style="width: 105px; position: relative; top: 185px; border-radius: 10px; margin-left: -350px;" src="assets/qrcod_dAoH.svg" alt="">
        <div class="card_log_in">
            <img style="margin-left: -190px; margin-top: 15px; width: 20px;" src="assets/scan.svg" alt="">
        </div>
        <p style="font-family: Inter, sans-serif; margin-top: -384px;  margin-left: -45px; font-size: 14px; font-weight: 500;">
            Scan QR code
        </p>
        <p style="font-family: Inter, sans-serif; font-size: 11px; margin-left: 39px; margin-top: -5px; opacity: 50%;">
            Отсканируйте QR code чтобы зайди в Аккаунт 
            <br> 
            <span style="margin-left: -142px;">
                через приложение!
            </span>
        </p>

        <!-- Форма -->
        <form action="">
            <input class="input_email" placeholder=" Email" type="email"><br>
            <input class="input_password" placeholder=" Password" type="password">
            <br>
            <button class="btn">
                <span style="color: white; font-family: Inter, sans-serif; font-size: 15px; font-weight: 500;">Продолжить
                    <img style="position: relative; left: 10px; top: 1px;" src="assets/right.svg" alt="">
                </span>
            </button>
        </form>
     </center>

     <!-- Varict -->
     <center>
        <p style="margin-top: 65px; opacity: 40%; font-family: Inter, sans-serif; font-size: 13px;">Нет аккаунта? Оформите ServiceDetailPro+ <a style="color: black;" href="">на странице оплаты</a></p>
        <p style="margin-top: -3px; opacity: 40%; font-family: Inter, sans-serif; font-size: 13px;">Поддержка: <a style="color: black;" href="">AutoServiceDetailPro</a></p>
     </center>

</body>
</html>
